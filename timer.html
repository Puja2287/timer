<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="main-cont">
      <div class="timerBox">
        <span id="hour">00</span>
        <span>:</span>
        <span id="minute">00</span>
        <span>:</span>
        <span id="second">00</span>
      </div>
      <br />
      <div>
        <button
          id="timerBtn"
          class="btn btn-success border border-secondary rounded"
          onclick="startTimer()"
        >
          Start
        </button>
        <button
          class="btn btn-danger border border-primary rounded"
          id="stopBtn"
          onclick="stopTimer()"
        >
          Stop
        </button>
        <button
          class="btn btn-primary border border-primary rounded"
          id="resetTimerBtn"
          onclick="resetTimer()"
        >
          Reset
        </button>
      </div>
    </div>
    <script src="timer.js"></script>
  </body>
</html>
